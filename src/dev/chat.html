<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="author" content="Danilo Castro CE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat em tempo real</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/chat.css">
    <link rel="stylesheet" href="./css/AddLi.css">
    <link rel="stylesheet" href="./css/texto.css">
</head>
<body>
    <h1 id="meuNome">DANILO</h1>
    <div class="box-chat">
        <div class="chat-superior">
            <div class="box-painel">
                <ul id="mensgens"></ul>
            </div>
            <div class="box-users">
                <ul class="users" id="users"></ul>
            </div>
        </div>
        <div class="chat-inferior">
            <div class="box-textarea">
                <textarea class="chat-texto" name="chat-texto" id="chat-texto"></textarea>
            </div>
            <div class="box-enviar">
                    <svg 
                        onclick="on_click()"
                        xmlns="http://www.w3.org/2000/svg" 
                        height="24px" 
                        viewBox="0 -960 960 960" 
                        width="24px" 
                        fill="#000000">
                        <path d="M120-160v-640l760 320-760 320Zm80-120 474-200-474-200v140l240 60-240 60v140Zm0 0v-400 400Z"/>
                    </svg>
                
            </div>
        </div>
    </div>
    <script src="./js/script.js"></script>
</body>
</html>
